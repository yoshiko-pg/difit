name: Publish VS Code Extension

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      # Required to attach the .vsix to the GitHub release.
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.6.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The extension bundles difit, so its Marketplace version tracks the
      # difit version being released. The repository keeps a placeholder
      # version; it is only rewritten here at publish time.
      - name: Sync extension version with difit
        run: |
          VERSION=$(node -p "require('./package.json').version")
          (cd packages/vscode && npm pkg set version="$VERSION")
          echo "Publishing difit-vscode $VERSION"

      - name: Package VS Code extension
        run: pnpm run package:vscode

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --packagePath difit-vscode-*.vsix

      - name: Publish to Open VSX
        if: ${{ secrets.OVSX_PAT != '' }}
        working-directory: packages/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm dlx ovsx publish difit-vscode-*.vsix -p "$OVSX_PAT"

      - name: Attach VSIX to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" packages/vscode/difit-vscode-*.vsix --clobber
